<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="devbr-cli — APIs públicas brasileiras no terminal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#141a33"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="titulo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
    <pattern id="grade" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#334155" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" rx="14" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="14" fill="url(#grade)"/>
  <rect x="1" y="1" width="1198" height="298" rx="13" fill="none" stroke="#3b4a6b" stroke-width="1" opacity="0.6"/>

  <!-- selo -->
  <g transform="translate(64,64)">
    <rect x="0" y="0" width="64" height="64" rx="14" fill="#111a2e" stroke="#4c5b82" stroke-width="1.5"/>
    <path d="M14 44 V26 l10 7 v-7 l10 7 v-7 l12 8 v10 z" fill="#22d3ee"/>
    <rect x="17" y="16" width="5" height="9" rx="1" fill="#a78bfa"/>
    <circle cx="50" cy="15" r="2.6" fill="#f472b6"/>
  </g>

  <!-- título e subtítulo -->
  <text x="152" y="96" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="800" letter-spacing="1" fill="url(#titulo)">DEVBR-CLI</text>
  <text x="153" y="128" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#94a3b8">APIs públicas brasileiras no terminal · TypeScript · Node 18+ · npx</text>
  <text x="153" y="152" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#64748b">feriados · cotação · CEP · CNPJ · DDD · FIPE · IBGE · bancos — no seu terminal</text>

  <!-- pills -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">
    <rect x="912" y="52" width="88" height="26" rx="13" fill="#1d283f" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="956" y="69" text-anchor="middle" fill="#7dd3fc">npx</text>
    <rect x="1008" y="52" width="106" height="26" rx="13" fill="#1d283f" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="1061" y="69" text-anchor="middle" fill="#c4b5fd">8 comandos</text>
    <rect x="912" y="86" width="88" height="26" rx="13" fill="#1d283f" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="956" y="103" text-anchor="middle" fill="#6ee7b7">Node 18+</text>
    <rect x="1008" y="86" width="106" height="26" rx="13" fill="#1d283f" stroke="#f472b6" stroke-opacity="0.5"/>
    <text x="1061" y="103" text-anchor="middle" fill="#f9a8d4">MIT</text>
  </g>

  <!-- mini terminal -->
  <g transform="translate(64,190)">
    <rect x="0" y="0" width="1072" height="86" rx="10" fill="#0c111f" stroke="#2b3550"/>
    <circle cx="22" cy="20" r="5" fill="#ff5f56"/>
    <circle cx="40" cy="20" r="5" fill="#ffbd2e"/>
    <circle cx="58" cy="20" r="5" fill="#27c93f"/>
    <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14.5">
      <text x="22" y="55"><tspan fill="#3fb950">$</tspan><tspan fill="#e6edf3" dx="8">npx devbr-cli cep 01001-000</tspan></text>
      <text x="22" y="74"><tspan fill="#39c5cf">São Paulo · SP</tspan><tspan fill="#8b949e" dx="10">— Praça da Sé</tspan></text>
    </g>
  </g>
</svg>
