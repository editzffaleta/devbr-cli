# CI do devbr-cli: valida o codigo em cada push/PR (nao publica no npm — isso e manual).
name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  # Lint, typecheck, testes e build nas versoes de Node suportadas pelo toolchain.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Garante que o bundle publicado roda na versao minima suportada (Node 18, fetch nativo).
  runtime-node18:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node dist/cli.js --version
